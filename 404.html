<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: 'Arial', sans-serif; overflow: hidden; }
        .container { margin-top: 10%; }
        h1 { font-size: 100px; margin: 0; color: #ff4757; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        p { font-size: 20px; opacity: 0.8; }
        .animation { font-size: 50px; animation: bounce 2s infinite; }
        @keyframes bounce { 
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        a { color: #2ed573; text-decoration: none; border: 1px solid #2ed573; padding: 10px 20px; border-radius: 5px; transition: 0.3s; }
        a:hover { background: #2ed573; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="animation"></div>
        <h1>404</h1>
        <p>Oops! The page you're looking for has drifted into deep space.</p>
        <br><br>
        <a href="/">Back to Dashboard</a>
    </div>
</body>
</html>
