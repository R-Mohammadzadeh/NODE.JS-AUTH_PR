<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4; color: #333; text-align: center; }
        .container { max-width: 500px; }
        h1 { font-size: 80px; margin: 0; color: #ff4b2b; }
        p { font-size: 1.2rem; margin: 10px 0 20px; }
        a { text-decoration: none; background: #ff4b2b; color: white; padding: 10px 20px; border-radius: 5px; transition: 0.3s; }
        a:hover { background: #ff416c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Sorry, the page you're looking for doesn't exist.</p>
        <a href="/">Go Back Home</a>
    </div>
</body>
</html>
