<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Analytics -->
   <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ZTLKRBWMY6'); 
</script>
    <link rel="stylesheet" href="./styles/login.css">
</head>
<body>

  <!-- register -->
<section class="user">
  <div class="user_options-container">
    <div class="user_options-text">
      <div class="user_options-unregistered">
        <h2 class="user_unregistered-title">Don't have an account?</h2>
        <p>Banjo tote bag bicycle rights, High Life sartorial cray craft beer.</p>
        <button class="user_unregistered-signup" id="signup-button">Sign up</button>
      </div>
      <div class="user_options-registered">
        <h2 class="user_registered-title">Have an account?</h2>
        <p>Banjo tote bag bicycle rights, High Life sartorial cray craft beer.</p>
        <button class="user_registered-login" id="login-button">Login</button>
      </div>
    </div>

    <div class="user_options-forms bounceRight" id="user_options-forms">
      <div class="user_forms-login">
        <h2 class="forms_title">Login</h2>
        <form class="forms_form" method="POST">
            <input type="email" placeholder="Email" class="forms_field-input" required name="email"/>
            <input type="password" placeholder="Password" class="forms_field-input" required name="password" style="margin-top:20px"/>
            <div class="forms_buttons">
                <button type="button" class="forms_buttons-forgot">Forgot?</button>
                <input type="submit" value="Log In" class="forms_buttons-action">
            </div>
        </form>
      </div>

      <div class="user_forms-signup">
        <h2 class="forms_title">Sign Up</h2>
        <form class="forms_form" method="POST">
            <input type="text" name="name" placeholder="Name" class="forms_field-input" required />
            <input type="text" name="family" placeholder="Family" class="forms_field-input" required />
            <input type="email" name="email" placeholder="Email" class="forms_field-input" required />
            <input type="password" name="password" placeholder="Password" class="forms_field-input" required />
            <div class="forms_buttons">
                <input type="submit" value="Sign up" class="forms_buttons-action">
            </div>
        </form>
      </div>
    </div>
  </div>
</section>

 <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="/javascripts/login.js"></script>
</body>
</html>
