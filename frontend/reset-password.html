<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Your Password</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/styles/login.css"> </head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f1f1f1;">
    <div style="background:white; padding:40px; border-radius:10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:400px;">
        <h2 style="margin-bottom:20px; color:#333;">New Password</h2>
        <input type="password" id="new-password" placeholder="Enter new password" class="forms_field-input" style="width:100%; margin-bottom:20px; padding:12px;">
        <button id="reset-btn" class="forms_buttons-action" style="width:100%; cursor:pointer;">Update Password</button>
    </div>
<!-- RESET PASSWORD WITH TOKEN AND VALIDATION  -->
<script>
    const submitBtn = document.getElementById('submitBtn');
    
    submitBtn.addEventListener('click', async () => {
        const password = document.getElementById('newPass').value;
        
        // Logic to extract token from the URL (localhost:7000/reset-password/TOKEN)
        const pathSegments = window.location.pathname.split('/');
        const token = pathSegments[pathSegments.length - 1];

        if (!password) {
            return Swal.fire('Error', 'Please enter a new password', 'error');
        }

        try {
            const response = await fetch(`/auth/resetPassword/${token}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            const data = await response.json();

            if (response.ok) {
                Swal.fire('Success', 'Password updated successfully!', 'success').then(() => {
                    window.location.href = '/login';
                });
            } else {
                Swal.fire('Error', data.message, 'error');
            }
        } catch (error) {
            Swal.fire('Error', 'Server connection failed', 'error');
        }
    });
</script>
</body>
</html>
